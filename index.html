/* ─── RESPONSIVE WIDTH HOOK ────────────────────────────────────────────── */
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

function getKeywords(title, skills) {
  const t = (title || "").toLowerCase().trim();
  let kw = KEYWORD_MAP[t];
  if (!kw) {
    const found = Object.keys(KEYWORD_MAP).find(k => t.includes(k) || k.split(" ").every(w => t.includes(w)));
    kw = found ? KEYWORD_MAP[found] : [];
  }
  const skillWords = Object.values(skills).filter(Boolean).join(",").split(",").map(s => s.trim()).filter(s => s.length > 2).slice(0, 8);
  return [...new Set([...kw, ...skillWords])].slice(0, 20) || KEYWORD_MAP["default"];
}

function boldKeywords(text, keywords) {
  if (!keywords || !keywords.length || !text) return text;
  const safe = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
  return text.replace(new RegExp("(" + safe.join("|") + ")", "gi"), "<strong>$1</strong>");
}

/* ─── HELPERS ───────────────────────────────────────────────────────────── */
const uid = () => Math.random().toString(36).slice(2, 8);
const parseBullets = s => (s || "").split("\n").map(x => x.replace(/^[-•*]\s*/, "").trim()).filter(Boolean);
const fmtDate = v => { if (!v) return ""; const [y, m] = v.split("-"); const mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return m ? mo[+m - 1] + " " + y : y; };
const http = u => !u ? "" : /^https?:\/\//i.test(u) ? u : "https://" + u;
const escRTF = s => !s ? "" : String(s).replace(/\\/g,"\\\\").replace(/\{/g,"\\{").replace(/\}/g,"\\}").replace(/[^\x00-\x7F]/g, c => "\\u" + c.charCodeAt(0) + "?");

function allSkills(sk) {
  const cats = [
    sk.frontend && "Frontend: " + sk.frontend,
    sk.backend  && "Backend: "  + sk.backend,
    sk.cloud    && "Cloud: "    + sk.cloud,
    sk.database && "Database: " + sk.database,
    sk.tools    && "Tools: "    + sk.tools,
    sk.other    && sk.other,
  ].filter(Boolean);
  const flat = [sk.frontend, sk.backend, sk.cloud, sk.database, sk.tools, sk.other]
    .filter(Boolean).join(",").split(",").map(s => s.trim()).filter(Boolean);
  return { cats, flat };
}

/* ─── RESUME HTML GENERATOR ─────────────────────────────────────────────── */
function buildHTML(tpl, data) {
  const { color, accent, align, photo: hasPhoto } = tpl;
  const isLeft   = align === "left";
  const isCenter = align === "center";

  /* name font sizes per spec:
       left-aligned  → 24px
       center-aligned → 15px  */
  const nameSz = isLeft ? "24px" : "15px";

  const fullName = (data.firstName + " " + data.lastName).trim();
  const { flat: skillList, cats: skillCats } = allSkills(data.skills);
  const awards    = (data.awards    || "").split("\n").map(s => s.trim()).filter(Boolean);
  const languages = (data.languages || "").split(",").map(s => s.trim()).filter(Boolean);

  const currentJob = data.experience.find(e => e.current && e.title) || data.experience.find(e => e.title);
  const displayTitle = (data.jobTitle || "").trim() || (currentJob ? currentJob.title : "");
  const currentCo   = currentJob && currentJob.current ? currentJob.company : "";
  const keywords    = getKeywords(displayTitle, data.skills);

  const LH = "line-height:1.15;";

  /* linkify */
  const lnk = (u, label) => u ? '<a href="' + http(u) + '" target="_blank" style="color:' + color + ';text-decoration:none;">' + (label || u) + "</a>" : "";

  const contactLine = [
    data.email   ? '<a href="mailto:' + data.email + '" style="color:inherit;text-decoration:none;">' + data.email + "</a>" : "",
    data.phone   ? '<a href="tel:'    + data.phone + '" style="color:inherit;text-decoration:none;">' + data.phone + "</a>" : "",
    data.location || "",
    data.linkedin ? lnk(data.linkedin, "LinkedIn") : "",
    data.github   ? lnk(data.github,   "GitHub")   : "",
    data.website  ? lnk(data.website,  "Portfolio"): "",
  ].filter(Boolean).join(" &nbsp;|&nbsp; ");

  /* Section header – alignment follows heading alignment */
  const HA = isLeft ? "left" : "center";
  const sec = title =>
    '<div style="border-bottom:2px solid ' + color + ';margin:11px 0 5px;padding-bottom:2px;' +
    'font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;' +
    'color:' + color + ';text-align:' + HA + ';' + LH + '">' + title + "</div>";

  /* ── Experience block ── */
  const expBlock = data.experience.filter(e => e.company || e.title).map(e => {
    const dates = [fmtDate(e.startDate), e.current ? "Present" : fmtDate(e.endDate)].filter(Boolean).join(" – ");
    const bls   = parseBullets(e.bullets);
    return '<div style="margin-bottom:9px;' + LH + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;' + LH + '">' +
        '<span style="font-weight:700;font-size:11.5px;">' + (e.title || "") +
          (e.company ? ' <span style="font-weight:400;font-style:italic;color:#555;">@ ' + e.company + "</span>" : "") +
          (e.current ? ' <span style="font-size:9.5px;background:' + color + ';color:#fff;padding:1px 6px;border-radius:10px;font-weight:700;">Current</span>' : "") +
        "</span>" +
        '<span style="font-size:10.5px;color:#666;white-space:nowrap;">' + dates + (e.location ? " | " + e.location : "") + "</span>" +
      "</div>" +
      (bls.length
        ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' +
            bls.map(b => '<li style="font-size:11px;' + LH + 'margin-bottom:3px;">' + boldKeywords(b, keywords) + "</li>").join("") +
          "</ul>"
        : "") +
    "</div>";
  }).join("");

  /* ── Education block ── */
  const eduBlock = data.education.filter(e => e.school).map(e =>
    '<div style="margin-bottom:7px;display:flex;justify-content:space-between;flex-wrap:wrap;' + LH + '">' +
      "<div>" +
        '<div style="font-weight:700;font-size:11.5px;' + LH + '">' + (e.degree || "") + (e.field ? " in " + e.field : "") + "</div>" +
        '<div style="font-size:11px;color:#444;' + LH + '">' + e.school + (e.honors ? " — " + e.honors : "") + (e.gpa ? " | GPA: " + e.gpa : "") + "</div>" +
      "</div>" +
      '<span style="font-size:10.5px;color:#666;white-space:nowrap;">' + [fmtDate(e.startDate), fmtDate(e.endDate)].filter(Boolean).join(" – ") + "</span>" +
    "</div>"
  ).join("");

  /* ── Skills block ── */
  const skillsBlock = skillCats.length
    ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' +
        skillCats.map(cat => {
          const i = cat.indexOf(": ");
          return '<li style="font-size:11px;' + LH + 'margin-bottom:3px;"><span style="font-weight:700;color:' + color + ';">' + cat.slice(0, i) + ":</span> " + cat.slice(i + 2) + "</li>";
        }).join("") +
      "</ul>"
    : "";

  /* ── Certifications block ── */
  const certsArr = data.certifications.filter(c => c.name);
  const certBlock = certsArr.length
    ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' +
        certsArr.map(c =>
          '<li style="font-size:11px;' + LH + 'margin-bottom:3px;"><strong>' + c.name + "</strong>" +
          (c.issuer ? " — " + c.issuer : "") +
          (c.date   ? ' <span style="color:#666;">(' + fmtDate(c.date) + (c.expiry ? " – " + fmtDate(c.expiry) : "") + ")</span>" : "") +
          "</li>"
        ).join("") +
      "</ul>"
    : "";

  /* ── Projects block ── */
  const projArr = data.projects.filter(p => p.name);
  const projBlock = projArr.length
    ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' +
        projArr.map(p =>
          '<li style="font-size:11px;' + LH + 'margin-bottom:5px;"><strong>' + p.name + "</strong>" +
          (p.tech ? ' <span style="color:#666;font-size:10.5px;">[' + p.tech + "]</span>" : "") +
          (p.description ? "<div>" + boldKeywords(p.description, keywords) + "</div>" : "") +
          (p.url ? "<div>" + lnk(p.url) + "</div>" : "") +
          "</li>"
        ).join("") +
      "</ul>"
    : "";

  /* ── Publications block ── */
  const pubArr = data.publications.filter(p => p.title);
  const pubBlock = pubArr.length
    ? '<ol style="margin:4px 0 0 18px;padding:0;' + LH + '">' +
        pubArr.map(p =>
          '<li style="font-size:11px;' + LH + 'margin-bottom:4px;">' +
          (p.authors ? p.authors + ". " : "") + "<em>" + p.title + "</em>" +
          (p.journal ? ". " + p.journal : "") + (p.year ? " (" + p.year + ")" : "") + ".</li>"
        ).join("") +
      "</ol>"
    : "";

  /* ── Awards / Languages ── */
  const awardsBlock = awards.length
    ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' + awards.map(a => '<li style="font-size:11px;' + LH + 'margin-bottom:3px;">' + a + "</li>").join("") + "</ul>"
    : "";
  const langBlock = languages.length
    ? '<ul style="margin:4px 0 0 18px;padding:0;' + LH + '">' + languages.map(l => '<li style="font-size:11px;' + LH + 'margin-bottom:2px;">' + l + "</li>").join("") + "</ul>"
    : "";

  const pad = "padding:22px 26px;";

  /* ══════════════════════════════════════════════════════════════════════════
     LAYOUT A – PHOTO LEFT (photo:true)
     ▸ Image on the left, name+contact on the right
     ▸ No colored sidebar → 100% ATS-safe single-column text flow
     ▸ Name size follows align rule (15px center / 24px left)
     ══════════════════════════════════════════════════════════════════════════ */
  if (hasPhoto) {
    const photoEl = data.photoPreview
      ? '<img src="' + data.photoPreview + '" style="width:90px;height:90px;border-radius:6px;object-fit:cover;border:2px solid ' + color + ';display:block;flex-shrink:0;" alt="profile"/>'
      : '<div style="width:90px;height:90px;border-radius:6px;background:#f0f0f0;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;">👤</div>';

    const headerBlock =
      '<div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid ' + color + ';' + LH + '">' +
        photoEl +
        '<div style="flex:1;">' +
          '<h1 style="font-size:' + nameSz + ';font-weight:800;color:' + color + ';margin:0;' + LH + '">' + fullName + "</h1>" +
          (displayTitle
            ? '<div style="font-size:12px;color:' + accent + ';margin-top:3px;font-style:italic;' + LH + '">' + displayTitle +
              (currentCo ? ' &nbsp;·&nbsp; <strong style="color:' + color + ';">' + currentCo + "</strong>" : "") + "</div>"
            : "") +
          '<div style="font-size:10.5px;color:#555;margin-top:5px;' + LH + '">' + contactLine + "</div>" +
        "</div>" +
      "</div>";

    return (
      '<div style="font-family:Arial,sans-serif;max-width:720px;margin:0 auto;' + pad + 'color:#222;background:#fff;' + LH + '">' +
        headerBlock +
        (data.summary ? sec("Professional Summary") + '<p style="font-size:11px;' + LH + 'margin:0;">' + data.summary + "</p>" : "") +
        (expBlock   ? sec("Work Experience")         + expBlock    : "") +
        (eduBlock   ? sec("Education")               + eduBlock    : "") +
        (skillsBlock? sec("Skills")                  + skillsBlock : "") +
        (certBlock  ? sec("Certifications")          + certBlock   : "") +
        (projBlock  ? sec("Projects")                + projBlock   : "") +
        (awardsBlock? sec("Awards & Achievements")   + awardsBlock : "") +
        (langBlock  ? sec("Languages")               + langBlock   : "") +
      "</div>"
    );
  }

  /* ══════════════════════════════════════════════════════════════════════════
     LAYOUT B – LEFT ALIGNED (align:"left", no photo)
     ▸ Name 24px, bold, left-aligned
     ▸ Section headers left-aligned
     ══════════════════════════════════════════════════════════════════════════ */
  if (isLeft) {
    /* special: template 10 (Federal) gets a dark colour banner */
    const isFederal = tpl.id === 10;
    /* special: template 7 (Academic) shows publications */
    const isAcademic = tpl.id === 7;
    /* special: template 20 (Cybersecurity) uses red accent left-border */
    const isCyber = tpl.id === 20;

    const banner = isFederal
      ? '<div style="background:' + color + ';color:#fff;padding:12px 18px;margin:-22px -26px 14px;' + LH + '">' +
          '<h1 style="font-size:24px;font-weight:800;margin:0;' + LH + '">' + fullName + "</h1>" +
          (displayTitle ? '<div style="font-size:12px;color:#ffffffcc;margin-top:3px;' + LH + '">' + displayTitle + (currentCo ? " — " + currentCo : "") + "</div>" : "") +

  /* ══════════════════════════════════════════════════════════════════════════

function dlPDF(tpl, data) {
  const html = buildHTML(tpl, data);
  const page = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{box-sizing:border-box}body{margin:0}a{color:inherit}</style></head><body>" + html + "</body></html>";
  const url  = URL.createObjectURL(new Blob([page], { type: "text/html" }));
  const w    = window.open(url, "_blank");
  if (w) w.onload = () => { setTimeout(() => { w.print(); URL.revokeObjectURL(url); }, 600); };
}

function dlDOCX(tpl, data) {
  const name   = (data.firstName + " " + data.lastName).trim();
  const { cats } = allSkills(data.skills);
  const c      = tpl.color.replace("#", "");
  const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
  const contact = [data.email,data.phone,data.location,data.linkedin,data.github,data.website].filter(Boolean).join("  |  ");
  const cj  = data.experience.find(e => e.current && e.title) || data.experience.find(e => e.title);
  const dt  = (data.jobTitle||"").trim() || (cj ? cj.title : "");
  const secR = t => "\\pard\\sb100{\\b\\fs22\\cf1 " + t.toUpperCase() + "}\\par\\pard{\\cf1 " + Array(55).fill("_").join("") + "}\\par\n";
  const bul  = t => "\\pard\\li300\\fi-180{\\fs22 \\bullet  " + escRTF(t) + "}\\par\n";

  let rtf = "{\\rtf1\\ansi\\deff0\n{\\fonttbl{\\f0 Arial;}{\\f1 Georgia;}}\n" +
    "{\\colortbl;\\red" + r + "\\green" + g + "\\blue" + b + ";\\red100\\green100\\blue100;}\n" +
    "\\paperw12240\\paperh15840\\margl1440\\margr1440\\margt1440\\margb1440\n\\f0\\fs22\\cf0\n";
  rtf += "\\pard\\qc{\\f1\\fs34\\b\\cf1 " + escRTF(name) + "}\\par\n";
  if (dt)      rtf += "\\pard\\qc{\\fs22\\i " + escRTF(dt) + "}\\par\n";
  rtf += "\\pard\\qc{\\fs20\\cf2 " + escRTF(contact) + "}\\par\\par\n";
  if (data.summary) { rtf += secR("Professional Summary"); rtf += "\\pard\\sb60{\\fs22 " + escRTF(data.summary) + "}\\par\\par\n"; }
  const exps = data.experience.filter(e => e.company || e.title);
  if (exps.length) {
    rtf += secR("Work Experience");
    exps.forEach(e => {
      const dates = [fmtDate(e.startDate), e.current ? "Present" : fmtDate(e.endDate)].filter(Boolean).join(" - ");
      rtf += "\\pard\\sb80{\\b\\fs22 " + escRTF(e.title||"") + "} \\emdash  {\\i " + escRTF(e.company||"") + "}\\tab{\\fs20 " + escRTF(dates) + "}\\par\n";
      parseBullets(e.bullets).forEach(bl => { rtf += bul(bl); });
      rtf += "\\par\n";
    });
  }
  const edus = data.education.filter(e => e.school);
  if (edus.length) {
    rtf += secR("Education");
    edus.forEach(e => { rtf += "\\pard\\sb80{\\b\\fs22 " + escRTF((e.degree||"") + (e.field ? " in " + e.field : "")) + "} {\\i " + escRTF(e.school) + "}\\par\\par\n"; });
  }
  if (cats.length) { rtf += secR("Skills"); cats.forEach(s => { rtf += "\\pard\\sb40{\\fs22 " + escRTF(s) + "}\\par\n"; }); }
  const certs = data.certifications.filter(c2 => c2.name);
  if (certs.length) {
    rtf += secR("Certifications");
    certs.forEach(ct => { rtf += "\\pard\\sb60{\\b\\fs22 " + escRTF(ct.name) + "}" + (ct.issuer ? " \\emdash  {\\i " + escRTF(ct.issuer) + "}" : "") + "\\par\n"; });
  }
  rtf += "}";

  const url = URL.createObjectURL(new Blob([rtf], { type: "application/msword" }));
  const a   = document.createElement("a");
  a.href = url; a.download = (name || "resume").replace(/\s+/g, "_") + "_resume.doc"; a.click();
  URL.revokeObjectURL(url);
}

/* ─── JD ANALYSIS STEP ──────────────────────────────────────────────────── */
function JDAnalysisStep({ tpl, onBack, onContinue }) {
  const [url,       setUrl]       = useState("");
  const [jdText,    setJdText]    = useState("");
  const [inputMode, setInputMode] = useState("url");
  const [loading,   setLoading]   = useState(false);
  const [statusMsg, setStatus]    = useState("");
  const [error,     setError]     = useState("");
  const [analysis,  setAnalysis]  = useState(null);

  const accent = tpl.color === "#1a1a1a" ? "#888" : tpl.color;

  /* single Gemini function for both URL and paste modes */
  const callGemini = async ({ jobUrl, jobText }) => {
    const isUrl = !!jobUrl;
    const prompt = isUrl
      ? `You are a resume and recruitment expert.\n\nVisit this job posting URL and read the full job description:\n${jobUrl}\n\nAfter reading the page, extract all job details and return ONLY a single valid JSON object with NO markdown fences, NO extra text. Use exactly this schema:\n{\n  "jobTitle": "exact job title from the posting",\n  "company": "company name or null",\n  "experienceYears": "e.g. 3-5 years or 5+ years or null",\n  "experienceLevel": "Junior or Mid-level or Senior or Lead or Principal or null",\n  "techStack": ["all required technologies, languages, frameworks, tools"],\n  "softSkills": ["soft skills and competencies mentioned"],\n  "keywords": ["15 to 20 most important ATS resume keywords as short phrases"],\n  "requirements": ["5 to 7 key must-have requirements as brief strings"],\n  "niceToHave": ["optional or preferred qualifications"],\n  "salaryRange": "salary info if present, else null",\n  "workMode": "Remote or Hybrid or On-site or null",\n  "summary": "2 plain English sentences summarising what they need"\n}`
      : `You are a resume and recruitment expert. Carefully analyse this job description.\n\nJOB DESCRIPTION:\n"""\n${(jobText||"").slice(0,8000)}\n"""\n\nReturn ONLY a single valid JSON object. NO markdown fences, NO explanation. Use exactly this schema:\n{\n  "jobTitle": "exact job title",\n  "company": "company name or null",\n  "experienceYears": "e.g. 3-5 years or 5+ years or null",\n  "experienceLevel": "Junior or Mid-level or Senior or Lead or Principal or null",\n  "techStack": ["all required technologies, languages, frameworks, tools"],\n  "softSkills": ["soft skills mentioned"],\n  "keywords": ["15 to 20 most important ATS resume keywords as short phrases"],\n  "requirements": ["5 to 7 key must-have requirements as brief strings"],\n  "niceToHave": ["optional or preferred qualifications"],\n  "salaryRange": "salary info if present, else null",\n  "workMode": "Remote or Hybrid or On-site or null",\n  "summary": "2 plain English sentences describing what they need"\n}`;

    const body = {
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 1600 }
    };
    if (isUrl) body.tools = [{ url_context: {} }];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const t = await res.text().catch(() => "{}");
      let m = "Unknown error";
      try { m = JSON.parse(t)?.error?.message || t.slice(0,200); } catch(_) {}
      throw new Error(`Gemini ${res.status}: ${m}`);
    }
    const data  = await res.json();
    const raw   = (data?.candidates?.[0]?.content?.parts?.[0]?.text || "").replace(/```json|```/gi,"").trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("Gemini returned no JSON. Try pasting the job description text instead.");
    return JSON.parse(match[0]);
  };

  const handleUrl = async () => {
    const trimmed = url.trim();
    if (!trimmed) { setError("Please enter a job posting URL."); return; }
    const finalUrl = /^https?:\/\//i.test(trimmed) ? trimmed : "https://" + trimmed;
    setLoading(true); setError(""); setStatus("Sending URL to Gemini AI…");
    try { setAnalysis(await callGemini({ jobUrl: finalUrl })); }
    catch(e) { setError(e.message || "Could not analyse. Try pasting the job description text instead."); }
    setStatus(""); setLoading(false);
  };

  const handlePaste = async () => {
    const trimmed = jdText.trim();
    if (!trimmed || trimmed.length < 80) { setError("Please paste at least a few sentences of the job description."); return; }
    setLoading(true); setError(""); setStatus("Sending job description to Gemini AI…");
    try { setAnalysis(await callGemini({ jobText: trimmed })); }
    catch(e) { setError(e.message || "Analysis failed. Check your connection and try again."); }
    setStatus(""); setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)", fontFamily:"'Segoe UI',sans-serif", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"28px 14px" }}>
      <div style={{ width:"100%", maxWidth:700 }}>

        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <button onClick={onBack} style={{ background:"#ffffff15", border:"1px solid #ffffff30", color:"#fff", padding:"7px 14px", borderRadius:8, cursor:"pointer", fontSize:13 }}>← Back</button>
          <div>
            <div style={{ color:"#ffffffaa", fontSize:10.5 }}>Step 1 of 2 — Job Description Analysis</div>
            <div style={{ color:"#fff", fontWeight:700, fontSize:15 }}>
              <span style={{ display:"inline-block", width:11, height:11, background:tpl.color, borderRadius:"50%", marginRight:6, verticalAlign:"middle" }} />
              {tpl.name}
            </div>
          </div>
        </div>

        <div style={{ background:"#ffffff0d", border:"1px solid #ffffff18", borderRadius:14, overflow:"hidden" }}>
          <div style={{ background:tpl.color, padding:"15px 20px" }}>
            <h2 style={{ color:"#fff", margin:0, fontSize:17, fontWeight:800 }}>🎯 Analyse Job Description</h2>
            <p style={{ color:"#ffffffcc", margin:"4px 0 0", fontSize:12.5 }}>Paste the job URL or text — Gemini AI fetches and analyses it, then prints the full results here.</p>
          </div>

          <div style={{ padding:"20px" }}>

            {!analysis && (
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                {[["url","🔗 Job URL"],["paste","📋 Paste Text"]].map(([mode,label]) => (
                  <button key={mode} onClick={() => { setInputMode(mode); setError(""); }}
                    style={{ flex:1, padding:"9px 0", borderRadius:8, fontWeight:700, fontSize:13, cursor:"pointer",
                      border:`2px solid ${inputMode===mode ? tpl.color : "#ffffff22"}`,
                      background: inputMode===mode ? tpl.color+"25" : "transparent",
                      color: inputMode===mode ? tpl.color : "#ffffffaa" }}>
                    {label}
                  </button>
                ))}
              </div>
            )}

            {!analysis && inputMode === "url" && (
              <div>
                <label style={{ display:"block", color:"#ffffffcc", fontSize:11, fontWeight:700, marginBottom:6, textTransform:"uppercase", letterSpacing:0.5 }}>Job Posting URL</label>
                <div style={{ display:"flex", gap:8 }}>
                  <input value={url} onChange={e => { setUrl(e.target.value); setError(""); }} disabled={loading}
                    placeholder="https://linkedin.com/jobs/view/...  or  indeed.com/viewjob..."
                    onKeyDown={e => { if (e.key==="Enter" && !loading) handleUrl(); }}
                    style={{ flex:1, padding:"10px 13px", borderRadius:8, border:"1px solid #ffffff30", background:"#ffffff12", color:"#fff", fontSize:13, outline:"none", fontFamily:"inherit", opacity:loading?0.6:1 }} />
                  <button onClick={handleUrl} disabled={loading || !url.trim()}
                    style={{ padding:"10px 18px", background:loading||!url.trim()?"#555":tpl.color, color:"#fff", border:"none", borderRadius:8, fontWeight:700, fontSize:13, cursor:loading||!url.trim()?"not-allowed":"pointer", whiteSpace:"nowrap" }}>
                    {loading ? "…" : "Analyse →"}
                  </button>
                </div>
                <div style={{ color:"#ffffff38", fontSize:11, marginTop:7, lineHeight:1.5 }}>
                  Gemini visits the URL and reads the page directly — works with LinkedIn, Indeed, Glassdoor, Greenhouse, Lever, Workday.<br/>

/* Scaled-down rendered resume card for the gallery */
function TemplatePreview({ tpl }) {
  const SCALE = 0.28;
  const W     = 720;       // resume width in px (logical)
  const PH    = 900;       // preview height (logical) — we'll clip
  const cardH = Math.round(PH * SCALE);  // actual card height ≈ 252px

  const previewData = { ...DUMMY };
  // Use a plain colored circle as stand-in avatar (no external network request needed)
  if (!tpl.photo) previewData.photoPreview = null;
  else previewData.photoPreview =
    "data:image/svg+xml;utf8," + encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' width='90' height='90' viewBox='0 0 90 90'>` +
      `<rect width='90' height='90' fill='${tpl.color}22'/>` +
      `<circle cx='45' cy='33' r='18' fill='${tpl.color}88'/>` +
      `<ellipse cx='45' cy='75' rx='27' ry='20' fill='${tpl.color}88'/>` +
      `<circle cx='45' cy='33' r='16' fill='${tpl.color}cc'/>` +
      `<text x='45' y='39' font-family='Arial' font-size='18' fill='white' text-anchor='middle' font-weight='bold'>A</text>` +
      `</svg>`
    );

  const rawHTML = buildHTML(tpl, previewData);

  return (
    <div style={{
      width: "100%",
      height: cardH,
      overflow: "hidden",
      position: "relative",
      background: "#fff",
      borderRadius: "8px 8px 0 0",
      boxShadow: "inset 0 -3px 8px rgba(0,0,0,0.06)",
    }}>
      {/* The scaled iframe-like container */}
      <div style={{
        position: "absolute",
        top: 0,
        left: 0,
        width:  W + "px",
        height: PH + "px",
        transform: `scale(${SCALE})`,
        transformOrigin: "top left",
        pointerEvents: "none",
        background: "#fff",
      }}>
        <div dangerouslySetInnerHTML={{ __html: rawHTML }} />
      </div>

      {/* subtle template number badge */}
      <div style={{
        position:"absolute", top:6, right:7,
        background: tpl.color + "cc",
        color:"#fff", fontSize:9, fontWeight:700,
        padding:"2px 7px", borderRadius:20,
        backdropFilter:"blur(4px)",
      }}>#{tpl.id}</div>

      {/* layout badge */}
      <div style={{
        position:"absolute", bottom:6, left:7,
        background:"rgba(0,0,0,0.45)",
        color:"#fff", fontSize:8.5, fontWeight:600,
        padding:"2px 7px", borderRadius:20,
        backdropFilter:"blur(4px)",
      }}>
        {tpl.photo ? "📷 Photo-Left" : tpl.align==="center" ? "⊙ Centered" : "⊣ Left-Aligned"}
      </div>
    </div>
  );
}

    if (step !== "form") { jdApplied.current = false; return; }

      ...prev,
      jobTitle: jdData.jobTitle || prev.jobTitle,

        ...prev.skills,
        other: jdData.techStack && jdData.techStack.length
          ? jdData.techStack.join(", ").slice(0, 150)
          : prev.skills.other
      }
    }));
  }, [step, jdData]);

  /* ── HELPER FUNCTIONS ── */
  const setF   = (k, v)       => setForm(p => ({ ...p, [k]: v }));

  const setN   = (f, i, k, v) => setForm(p => { const a = [...p[f]]; a[i] = { ...a[i], [k]: v }; return { ...p, [f]: a }; });
  const addI   = (f, empty)   => setForm(p => ({ ...p, [f]: [...p[f], { ...empty, id: uid() }] }));
  const delI   = (f, i)       => setForm(p => ({ ...p, [f]: p[f].filter((_, j) => j !== i) }));

  const handlePhoto = e => {
    const file = e.target.files[0]; if (!file) return;

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))", gap:14 }}>
          {TEMPLATES.map(t => (
            <div key={t.id} onClick={() => { setTpl(t); setForm(EMPTY_FORM); setJdData(null); setStep("jd"); }}
              style={{ background:"#ffffff0f", border:"1px solid #ffffff15", borderRadius:12, overflow:"hidden", cursor:"pointer", transition:"all .22s" }}
              onMouseEnter={e => { e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow=`0 16px 36px ${t.color}60`; e.currentTarget.style.borderColor=t.color; }}
              onMouseLeave={e => { e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow=""; e.currentTarget.style.borderColor="#ffffff15"; }}>
              <TemplatePreview tpl={t} />
              <div style={{ padding:"9px 12px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:2 }}>
                  <h3 style={{ color:"#fff", fontSize:12.5, fontWeight:700, margin:0, lineHeight:1.3 }}>{t.name}</h3>
                  <span style={{ background:t.color+"28", color:t.color==="#1a1a1a"?"#aaa":t.color, fontSize:8, fontWeight:600, padding:"1px 7px", borderRadius:20, marginLeft:4, border:`1px solid ${t.color}35`, flexShrink:0, whiteSpace:"nowrap" }}>ATS ✓</span>
                </div>
                <div style={{ color:"#ffffff50", fontSize:9.5, marginBottom:7 }}>{t.cat}</div>
                <button style={{ width:"100%", padding:"7px 0", background:`linear-gradient(90deg,${t.color},${t.accent})`, color:"#fff", border:"none", borderRadius:6, fontWeight:700, fontSize:12, cursor:"pointer" }}>
                  Use Template →
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  /* ── JD ANALYSIS STEP ──────────────────────────────────────────────────── */
  if (step === "jd") {
    return <JDAnalysisStep
      tpl={tpl}
      onBack={() => setStep("gallery")}
      onContinue={(analysis) => {
        setJdData(analysis);
        setStep("form");
      }}
    />;
  }

  /* ── FORM ─────────────────────────────────────────────────────────────── */
  if (step === "form") {
    const showProj = [2,9,11,12,13,14,20].includes(tpl.id);
    const showPub  = tpl.id === 7;
    const showFed  = tpl.id === 10;

    return (
      <div style={{ height:"100vh", background:"#f4f5f7", fontFamily:"'Segoe UI',sans-serif", display:"flex", flexDirection:"column" }}>
        {/* top bar */}
        <div style={{ background:tpl.color, padding:"10px 16px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 2px 10px #00000030", flexShrink:0 }}>
          <button onClick={() => setStep("jd")} style={{ background:"#ffffff20", border:"none", color:"#fff", padding:"5px 11px", borderRadius:5, cursor:"pointer", fontSize:12 }}>← Back</button>
          <div>
            <div style={{ color:"#ffffffaa", fontSize:9.5 }}>Template #{tpl.id}</div>
            <div style={{ color:"#fff", fontWeight:700, fontSize:13.5 }}>{tpl.name} <span style={{ fontWeight:400, fontSize:11, opacity:.7 }}>— {tpl.cat}</span></div>
          </div>
          <button onClick={preview} style={{ marginLeft:"auto", background:"#fff", color:tpl.color, border:"none", padding:"7px 16px", borderRadius:7, fontWeight:700, fontSize:12.5, cursor:"pointer" }}>
            Preview & Download →
          </button>
        </div>

        {/* JD analysis ribbon — shown when jdData is present */}
        {jdData && (
          <div style={{ background:`${tpl.color}18`, borderBottom:`1px solid ${tpl.color}35`, padding:"8px 16px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", flexShrink:0 }}>
            <span style={{ background:tpl.color, color:"#fff", fontSize:10, fontWeight:700, padding:"3px 9px", borderRadius:20, whiteSpace:"nowrap" }}>🎯 JOB MATCH</span>
            <span style={{ fontSize:12, fontWeight:700, color:"#333" }}>{jdData.jobTitle || "Role"}</span>
            {jdData.company && <span style={{ fontSize:11.5, color:"#555" }}>@ {jdData.company}</span>}
            {jdData.experienceYears && (
              <span style={{ fontSize:11, background:"#ffffff80", padding:"2px 9px", borderRadius:20, color:"#333", border:"1px solid #ddd" }}>
                ⏱ {jdData.experienceYears}
              </span>
            )}
            {jdData.workMode && (
              <span style={{ fontSize:11, background:"#ffffff80", padding:"2px 9px", borderRadius:20, color:"#333", border:"1px solid #ddd" }}>
                📍 {jdData.workMode}
              </span>
            )}
            <div style={{ marginLeft:"auto", display:"flex", gap:7, flexWrap:"wrap" }}>
              {(jdData.techStack||[]).slice(0, 5).map((t2, i) => (
                <span key={i} style={{ fontSize:10.5, background:tpl.color+"20", color:tpl.color, padding:"2px 8px", borderRadius:20, fontWeight:600, border:`1px solid ${tpl.color}40` }}>{t2}</span>
              ))}
              {(jdData.techStack||[]).length > 5 && <span style={{ fontSize:10.5, color:"#888" }}>+{(jdData.techStack||[]).length - 5} more</span>}
            </div>
          </div>
        )}

        <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
          <AdSidebar side="left" />

          <div style={{ flex:1, overflowY:"auto", padding:"14px 12px" }}>
            <div style={{ maxWidth:660, margin:"0 auto" }}>

              {/* photo */}
              {tpl.photo && (
                <Card title="Profile Photo (shown on LEFT of resume)" color={tpl.color}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:60, height:60, borderRadius:6, background:"#eee", overflow:"hidden", border:`2px solid ${tpl.color}`, flexShrink:0 }}>
                      {form.photoPreview
                        ? <img src={form.photoPreview} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="p" />
                        : <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, color:"#ccc" }}>👤</div>}
                    </div>
                    <div>
                      <input type="file" accept="image/*" onChange={handlePhoto} id="pu" style={{ display:"none" }} />
                      <label htmlFor="pu" style={{ display:"inline-block", padding:"6px 13px", background:tpl.color, color:"#fff", borderRadius:5, cursor:"pointer", fontSize:12, fontWeight:600 }}>Upload Photo</label>
                      {form.photoPreview && <button onClick={() => setF("photoPreview", null)} style={{ marginLeft:7, background:"none", border:"1px solid #ddd", padding:"5px 9px", borderRadius:5, cursor:"pointer", fontSize:11 }}>Remove</button>}
                      <div style={{ fontSize:10, color:"#888", marginTop:3 }}>JPG/PNG · Square crop · appears LEFT of name</div>
                    </div>
                  </div>
                </Card>
              )}

              {/* personal */}
              <Card title="Personal Information" color={tpl.color}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                  <Inp label="First Name" value={form.firstName} onChange={v=>setF("firstName",v)} required />
                  <Inp label="Last Name"  value={form.lastName}  onChange={v=>setF("lastName",v)}  required />
                  <Inp label="Email"      value={form.email}     onChange={v=>setF("email",v)}     type="email" required />
                  <Inp label="Phone"      value={form.phone}     onChange={v=>setF("phone",v)}     type="tel" placeholder="+1 555 000 0000" />
                  <Inp label="Location"   value={form.location}  onChange={v=>setF("location",v)}  placeholder="City, State" />
                  <Inp label="Target Job Title" value={form.jobTitle} onChange={v=>setF("jobTitle",v)} placeholder="e.g. Senior Software Engineer" />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0 11px" }}>
                  <LnkInp label="LinkedIn URL"    value={form.linkedin} onChange={v=>setF("linkedin",v)} placeholder="linkedin.com/in/name" />
                  <LnkInp label="GitHub URL"      value={form.github}   onChange={v=>setF("github",v)}   placeholder="github.com/username" />
                  <LnkInp label="Portfolio/Site"  value={form.website}  onChange={v=>setF("website",v)}  placeholder="yoursite.com" />
                </div>
                <TA label="Professional Summary (keyword-rich, 2-4 sentences)" value={form.summary} onChange={v=>setF("summary",v)}
                  placeholder="Results-driven professional with X years of experience in... Proven track record of..." rows={3} />
              </Card>

              {/* experience */}
              <Card title="Work Experience" color={tpl.color}
                onAdd={() => addI("experience", { company:"", title:"", startDate:"", endDate:"", current:false, location:"", bullets:"" })}
                addLabel="Add Position">
                {form.experience.map((exp, idx) => (
                  <div key={exp.id} style={{ marginBottom:13, paddingBottom:13, borderBottom:idx < form.experience.length-1 ? "1px dashed #eee" : "none" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontWeight:700, fontSize:12, color:tpl.color }}>Position {idx+1}</span>
                        {exp.current && <span style={{ background:`linear-gradient(90deg,${tpl.color},${tpl.accent})`, color:"#fff", fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>● Current</span>}
                      </div>
                      {idx > 0 && <button onClick={() => delI("experience", idx)} style={{ background:"none", border:"1px solid #ffaaaa", color:"#e53e3e", padding:"1px 9px", borderRadius:4, cursor:"pointer", fontSize:11 }}>Remove</button>}
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                      <Inp label="Job Title"    value={exp.title}   onChange={v => setN("experience",idx,"title",v)} />
                      <Inp label="Company Name" value={exp.company} onChange={v => setN("experience",idx,"company",v)} />
                      <MonthPick label="Start Date" value={exp.startDate} onChange={v => setN("experience",idx,"startDate",v)} />
                      {exp.current
                        ? <div style={{ marginBottom:10 }}>
                            <label style={{ display:"block", fontSize:10.5, fontWeight:600, color:"#555", marginBottom:2, textTransform:"uppercase", letterSpacing:0.4 }}>End Date</label>
                            <div style={{ padding:"6px 10px", border:`1px solid ${tpl.color}60`, borderRadius:5, fontSize:12.5, background:`${tpl.color}08`, color:tpl.color, fontWeight:700 }}>Present (Current Role)</div>
                          </div>
                        : <MonthPick label="End Date" value={exp.endDate} onChange={v => setN("experience",idx,"endDate",v)} />
                      }
                      <Inp label="Location" value={exp.location} onChange={v => setN("experience",idx,"location",v)} placeholder="City, State or Remote" />
                    </div>
                    {/* currently working toggle */}
                    <label style={{ display:"inline-flex", alignItems:"center", gap:8, cursor:"pointer", marginBottom:10, marginTop:2, padding:"5px 11px", background:exp.current?`${tpl.color}12`:"#f5f6fa", border:`1px solid ${exp.current?tpl.color+"50":"#e0e0e0"}`, borderRadius:6 }}>
                      <input type="checkbox" checked={exp.current}
                        onChange={e => { setN("experience",idx,"current",e.target.checked); if(e.target.checked) setN("experience",idx,"endDate",""); }}
                        style={{ width:15, height:15, accentColor:tpl.color, cursor:"pointer" }} />
                      <span style={{ fontSize:12, fontWeight:600, color:exp.current?tpl.color:"#555" }}>✅ I currently work here</span>
                      {exp.current && exp.title && <span style={{ fontSize:10.5, color:"#888" }}>— shows as <strong style={{ color:tpl.color }}>{exp.title}</strong></span>}
                    </label>
    {/* keyword suggestions */}
                    <KwPanel
                      jobTitle={exp.title || form.jobTitle}
                      skills={form.skills}
                      color={tpl.color}
                      jdKeywords={jdData ? jdData.keywords : []}
                      onInsert={kw => insertKw(kw, idx)}
                    />
                    <TA label="Key Responsibilities & Achievements (one per line — keywords auto-bold)"
                      value={exp.bullets} onChange={v => setN("experience",idx,"bullets",v)}
                      placeholder={"- Led team of 8 engineers, deployed microservices on Kubernetes\n- Reduced latency by 40% through Redis caching\n- Implemented CI/CD pipeline cutting release time by 60%"}
                      rows={5} />
                  </div>
                ))}
              </Card>

              {/* education */}
              <Card title="Education" color={tpl.color}
                onAdd={() => addI("education", { school:"", degree:"", field:"", gpa:"", startDate:"", endDate:"", honors:"" })}
                addLabel="Add Degree">
                {form.education.map((edu, idx) => (
                  <div key={edu.id} style={{ marginBottom:11, paddingBottom:11, borderBottom:idx < form.education.length-1 ? "1px dashed #eee" : "none" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                      <span style={{ fontWeight:700, fontSize:12, color:tpl.color }}>Degree {idx+1}</span>
                      {idx > 0 && <button onClick={() => delI("education", idx)} style={{ background:"none", border:"1px solid #ffaaaa", color:"#e53e3e", padding:"1px 9px", borderRadius:4, cursor:"pointer", fontSize:11 }}>Remove</button>}
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                      <Inp label="University / School" value={edu.school} onChange={v => setN("education",idx,"school",v)} />
                      <Inp label="Degree Type" value={edu.degree} onChange={v => setN("education",idx,"degree",v)} placeholder="Bachelor of Science" />
                      <Inp label="Field of Study" value={edu.field} onChange={v => setN("education",idx,"field",v)} placeholder="Computer Science" />
                      <Inp label="GPA" value={edu.gpa} onChange={v => setN("education",idx,"gpa",v)} type="number" min="0" max="4" placeholder="3.8" />
                      <MonthPick label="Start Date" value={edu.startDate} onChange={v => setN("education",idx,"startDate",v)} />
                      <MonthPick label="End Date"   value={edu.endDate}   onChange={v => setN("education",idx,"endDate",v)} />
                      <Inp label="Honors / Distinctions" value={edu.honors} onChange={v => setN("education",idx,"honors",v)} placeholder="Magna Cum Laude" />
                    </div>
                  </div>
                ))}
              </Card>

              {/* skills */}
              <Card title="Technical Skills" color={tpl.color}>
                <div style={{ background:`${tpl.color}08`, borderRadius:6, padding:"7px 11px", marginBottom:9, fontSize:10.5, color:"#555", lineHeight:1.5 }}>
                  💡 Fill categories that apply. Skills also power keyword suggestions above.
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                  <Inp label="⚛️ Frontend"  value={form.skills.frontend} onChange={v=>setSk("frontend",v)} placeholder="React, Vue, TypeScript, HTML, CSS" />
                  <Inp label="🖥️ Backend"   value={form.skills.backend}  onChange={v=>setSk("backend",v)}  placeholder="Node.js, Python, Java, FastAPI" />
                  <Inp label="☁️ Cloud"     value={form.skills.cloud}    onChange={v=>setSk("cloud",v)}    placeholder="AWS, Azure, GCP, Docker, K8s" />
                  <Inp label="🗄️ Databases" value={form.skills.database} onChange={v=>setSk("database",v)} placeholder="PostgreSQL, MySQL, MongoDB, Redis" />
                  <Inp label="🔧 Tools"     value={form.skills.tools}    onChange={v=>setSk("tools",v)}    placeholder="Git, JIRA, Figma, Jenkins" />
                  <Inp label="✨ Other"     value={form.skills.other}    onChange={v=>setSk("other",v)}    placeholder="Agile, Scrum, ML, Leadership" />
                </div>
              </Card>

              {/* certifications */}
              <Card title="Certifications & Licenses" color={tpl.color}
                onAdd={() => addI("certifications", { name:"", issuer:"", date:"", expiry:"" })}
                addLabel="Add Cert">
                {form.certifications.map((cert, idx) => (
                  <div key={cert.id} style={{ display:"grid", gridTemplateColumns:"2fr 2fr 1fr 1fr", gap:"0 8px", marginBottom:9, paddingBottom:9, borderBottom:idx<form.certifications.length-1?"1px dashed #eee":"none" }}>
                    <Inp label="Certification Name" value={cert.name}   onChange={v=>setN("certifications",idx,"name",v)}   placeholder="AWS Solutions Architect" />
                    <Inp label="Issuing Org"         value={cert.issuer} onChange={v=>setN("certifications",idx,"issuer",v)} placeholder="Amazon Web Services" />
                    <MonthPick label="Issue Date" value={cert.date}   onChange={v=>setN("certifications",idx,"date",v)} />
                    <MonthPick label="Expiry"     value={cert.expiry} onChange={v=>setN("certifications",idx,"expiry",v)} />
                  </div>
                ))}
              </Card>

              {/* projects */}
              {showProj && (
                <Card title="Projects" color={tpl.color}
                  onAdd={() => addI("projects", { name:"", tech:"", description:"", url:"" })}
                  addLabel="Add Project">
                  {form.projects.map((proj, idx) => (
                    <div key={proj.id} style={{ marginBottom:11, paddingBottom:11, borderBottom:idx<form.projects.length-1?"1px dashed #eee":"none" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                        <Inp label="Project Name" value={proj.name} onChange={v=>setN("projects",idx,"name",v)} />
                        <Inp label="Tech Stack"   value={proj.tech} onChange={v=>setN("projects",idx,"tech",v)} placeholder="React, Node.js, PostgreSQL" />
                        <LnkInp label="Project URL / GitHub" value={proj.url} onChange={v=>setN("projects",idx,"url",v)} />
                      </div>
                      <TA label="Description" value={proj.description} onChange={v=>setN("projects",idx,"description",v)} rows={2} placeholder="What you built and its impact..." />
                    </div>
                  ))}
                </Card>
              )}

              {/* publications */}
              {showPub && (
                <Card title="Publications" color={tpl.color}
                  onAdd={() => addI("publications", { title:"", journal:"", year:"", authors:"" })}
                  addLabel="Add Publication">
                  {form.publications.map((pub, idx) => (
                    <div key={pub.id} style={{ marginBottom:9, paddingBottom:9, borderBottom:idx<form.publications.length-1?"1px dashed #eee":"none" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 11px" }}>
                        <Inp label="Title"   value={pub.title}   onChange={v=>setN("publications",idx,"title",v)} />
                        <Inp label="Journal" value={pub.journal} onChange={v=>setN("publications",idx,"journal",v)} />
                        <Inp label="Year" value={pub.year} onChange={v=>setN("publications",idx,"year",v)} type="number" min="1900" max="2099" placeholder="2024" />
                        <Inp label="Authors" value={pub.authors} onChange={v=>setN("publications",idx,"authors",v)} placeholder="Smith J., Doe A." />
                      </div>
                    </div>
                  ))}
                </Card>
              )}

              {/* federal */}
              {showFed && (
                <Card title="Federal Application Details" color={tpl.color}>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0 11px" }}>
                    <Inp label="Citizenship"        value={form.citizenship}       onChange={v=>setF("citizenship",v)}       placeholder="U.S. Citizen" />
                    <Inp label="Security Clearance" value={form.securityClearance} onChange={v=>setF("securityClearance",v)} placeholder="TS/SCI, Secret" />
                    <Inp label="Federal Grade"      value={form.federalGrade}      onChange={v=>setF("federalGrade",v)}      placeholder="GS-13, 0301" />
                  </div>
                </Card>
              )}

              {/* additional */}
              <Card title="Additional Information" color={tpl.color}>
                <TA label="Awards & Achievements (one per line)" value={form.awards}     onChange={v=>setF("awards",v)}     rows={3} placeholder={"Employee of the Year 2023\nHackathon Winner\nDean's List"} />
                <TA label="Languages (comma-separated)"          value={form.languages}  onChange={v=>setF("languages",v)}  rows={2} placeholder="English (Native), Spanish (Fluent)" />
                <TA label="Volunteer / Interests (optional)"     value={form.volunteer}  onChange={v=>setF("volunteer",v)}  rows={2} />
              </Card>

              <div style={{ textAlign:"center", padding:"14px 0 24px" }}>
                <button onClick={preview} style={{ padding:"11px 34px", background:`linear-gradient(90deg,${tpl.color},${tpl.accent})`, color:"#fff", border:"none", borderRadius:8, fontWeight:800, fontSize:14.5, cursor:"pointer", boxShadow:`0 4px 16px ${tpl.color}50` }}>
                  Preview My Resume →
                </button>
              </div>
            </div>
          </div>

          <AdSidebar side="right" />
        </div>
      </div>
    );
  }

  /* ── PREVIEW ──────────────────────────────────────────────────────────── */
  if (step === "preview") return (
    <div style={{ height:"100vh", background:"#e8eaed", fontFamily:"'Segoe UI',sans-serif", display:"flex", flexDirection:"column" }}>
      <div style={{ background:tpl.color, padding:"10px 18px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 2px 10px #00000030", flexShrink:0 }}>
        <button onClick={() => setStep("form")} style={{ background:"#ffffff20", border:"none", color:"#fff", padding:"5px 11px", borderRadius:5, cursor:"pointer", fontSize:12 }}>← Edit</button>
        <span style={{ color:"#fff", fontWeight:700, fontSize:13.5, marginRight:"auto" }}>{tpl.name} — Preview</span>
        <button onClick={async () => { setBusy(true); dlDOCX(tpl, form); setBusy(false); }} disabled={busy}
          style={{ background:"#1a73e8", color:"#fff", border:"none", padding:"7px 15px", borderRadius:6, fontWeight:700, fontSize:12.5, cursor:"pointer" }}>📄 Word</button>
        <button onClick={async () => { setBusy(true); dlPDF(tpl, form); setBusy(false); }} disabled={busy}
          style={{ background:"#e53935", color:"#fff", border:"none", padding:"7px 15px", borderRadius:6, fontWeight:700, fontSize:12.5, cursor:"pointer" }}>📑 PDF</button>
      </div>
      <div style={{ background:"#fff", borderBottom:"1px solid #ddd", padding:"5px 18px", display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", flexShrink:0 }}>
        <div style={{ background:"#e8f5e9", border:"1px solid #81c784", borderRadius:5, padding:"3px 11px", fontSize:11, fontWeight:700, color:"#2e7d32" }}>✅ ATS Score: 95%+</div>
        {["Bullet points everywhere","1.15 line-height","Keywords auto-bolded","Photo-left layout","No sidebar columns"].map((b,i) => (
          <div key={i} style={{ background:"#e3f2fd", border:"1px solid #90caf9", borderRadius:5, padding:"3px 10px", fontSize:10.5, color:"#1565c0" }}>✓ {b}</div>
        ))}
      </div>
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <AdSidebar side="left" />
        <div style={{ flex:1, overflowY:"auto", padding:"18px 14px" }}>
          <div style={{ maxWidth:790, margin:"0 auto", background:"#fff", boxShadow:"0 6px 28px #00000020", borderRadius:2 }}>
            <div dangerouslySetInnerHTML={{ __html: html }} />
          </div>
        </div>
        <AdSidebar side="right" />
      </div>
    </div>
  );

  return null;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
